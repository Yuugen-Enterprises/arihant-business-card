<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arihant Jain — Digital Business Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --navy: #101B27;
    --panel: #16232F;
    --panel-2: #1C2B38;
    --ivory: #F3EDE2;
    --brass: #C0A063;
    --brass-dim: #8B7442;
    --slate: #7E8CA0;
    --hairline: rgba(243,237,226,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at 20% 0%, #17222E 0%, #0B131C 70%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter',sans-serif;
    padding: 28px 16px;
  }

  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    width:100%;
    max-width:760px;
  }

  .card{
    width:100%;
    background: var(--panel);
    border-radius:18px;
    overflow:hidden;
    display:grid;
    grid-template-columns: 232px 1fr;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(243,237,226,0.06);
    position:relative;
  }

  /* PHOTO PANEL */
  .photo-panel{
    position:relative;
    min-height: 100%;
  }
  .photo-panel img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    filter: saturate(0.85) contrast(1.03);
  }
  .photo-tint{
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(16,27,39,0.05) 0%, rgba(16,27,39,0.15) 55%, rgba(16,27,39,0.55) 100%),
                linear-gradient(90deg, rgba(16,27,39,0.35) 0%, rgba(16,27,39,0) 30%);
    mix-blend-mode:multiply;
  }
  .photo-tint-color{
    position:absolute; inset:0;
    background: linear-gradient(200deg, rgba(192,160,99,0.16), rgba(16,27,39,0.28));
    mix-blend-mode: color;
  }
  .eyebrow-photo{
    position:absolute;
    top:16px; left:16px;
    font-family:'Inter',sans-serif;
    font-size:9.5px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color: rgba(243,237,226,0.72);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    border-left: 1px solid rgba(243,237,226,0.35);
    padding-left:8px;
  }

  /* INFO PANEL */
  .info-panel{
    padding: 30px 30px 26px 30px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
  }

  .top-block{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .eyebrow{
    font-size:10px;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color: var(--brass);
    font-weight:600;
  }

  .name{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:500;
    font-size:38px;
    line-height:1.05;
    color: var(--ivory);
    letter-spacing: -0.01em;
  }

  .title{
    font-size:13.5px;
    color: var(--slate);
    font-weight:500;
    letter-spacing:0.01em;
  }

  .divider{
    height:1px;
    background: var(--hairline);
    margin: 16px 0 16px 0;
  }

  .details{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .detail-row{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:12.5px;
    color: var(--ivory);
  }
  .detail-row .icon{
    width:15px; height:15px;
    flex-shrink:0;
    color: var(--brass);
  }
  .detail-row a{
    color: var(--ivory);
    text-decoration:none;
  }
  .detail-row a:hover{ color: var(--brass); }

  /* BOTTOM STUB */
  .stub{
    margin-top:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    padding-top:20px;
    border-top: 1px dashed rgba(243,237,226,0.22);
    position:relative;
  }
  .stub::before, .stub::after{
    content:"";
    position:absolute;
    top:-7px;
    width:14px; height:14px;
    background: radial-gradient(circle at center, #0B131C 60%, transparent 62%);
    border-radius:50%;
  }
  .stub::before{ left:-42px; }
  .stub::after{ right:-42px; }

  .scan-label{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    text-align:center;
  }
  .scan-label .k{
    font-size:9.5px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color: var(--brass);
    font-weight:600;
  }
  .scan-label .v{
    font-size:11px;
    color: var(--slate);
  }

  .qr-wrap{
    background: var(--ivory);
    padding:12px;
    border-radius:8px;
    line-height:0;
    flex-shrink:0;
    display:inline-flex;
  }
  #qrcode img{ display:block; border-radius:2px; width:168px; height:168px; }

  .save-btn{
    margin-top:14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:11px 18px;
    background: transparent;
    border: 1px solid var(--brass-dim);
    color: var(--brass);
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-weight:600;
    border-radius:8px;
    cursor:pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .save-btn:hover{
    background: var(--brass);
    color: var(--navy);
  }

  .footnote{
    text-align:center;
    font-size:10.5px;
    color: rgba(126,140,160,0.7);
    letter-spacing:0.04em;
  }

  @media (max-width: 560px){
    .card{ grid-template-columns: 1fr; }
    .photo-panel{ height:260px; }
    .eyebrow-photo{ display:none; }
    .name{ font-size:32px; }
    .stub::before, .stub::after{ display:none; }
  }
</style>
</head>
